<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0B0B0C" />
    <title>ГРАФЪ · Барбершоп</title>
    <meta
      name="description"
      content="Барбершоп ГРАФЪ в Москве: стрижки, борода и королевское бритьё. Запись к мастеру онлайн и ИИ-консультант."
    />

    <!-- Иконки. SVG-favicon поддерживают современные браузеры. -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!--
      Превью для соцсетей и Telegram (Open Graph + Twitter Card).
      ВАЖНО: некоторым площадкам (Facebook и т.п.) нужны АБСОЛЮТНЫЕ ссылки —
      после привязки домена замените og:url и og:image на https://ваш-домен/...
    -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="ГРАФЪ" />
    <meta property="og:title" content="ГРАФЪ · Барбершоп в Москве" />
    <meta
      property="og:description"
      content="Стрижки, борода и королевское бритьё. Запись к мастеру онлайн и ИИ-консультант."
    />
    <meta property="og:image" content="/og-image.jpg" />
    <meta property="og:image:width" content="1280" />
    <meta property="og:image:height" content="853" />
    <meta property="og:url" content="/" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ГРАФЪ · Барбершоп в Москве" />
    <meta
      name="twitter:description"
      content="Стрижки, борода и королевское бритьё. Запись к мастеру онлайн и ИИ-консультант."
    />
    <meta name="twitter:image" content="/og-image.jpg" />

    <!--
      Telegram WebApp SDK. Внутри Telegram window.Telegram.WebApp появится сразу.
      Вне Telegram объект будет undefined — приложение продолжит работать как обычный сайт.
    -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
      html,
      body,
      #root {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #050505;
      }
      body {
        -webkit-tap-highlight-color: transparent;
        overscroll-behavior: none;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
